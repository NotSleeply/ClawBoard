name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Test
        run: pnpm test
        continue-on-error: false

      - name: CLI Smoke Test
        run: |
          node src/cli/index.js --help
          node src/cli/index.js --version
          node src/cli/index.js list
          node src/cli/index.js stats

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Trigger AI Self-Healing on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[CI Failure] Self-healing request for commit ${context.sha.substring(0, 7)}`,
              body: `CI Pipeline failed on branch **${context.ref}**.\n\nPlease investigate the logs and apply a fix.\n\nRun URL: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })
